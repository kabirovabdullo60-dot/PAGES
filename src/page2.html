<!DOCTYPE html>

<body class="bg-white min-h-screen flex flex-col items-center p-4">

                <a href="#" class="block">
                    <img src="./image_page2/Лого.png" alt="OkeyPost" class="h-8">
                </a>
                
                <nav class="hidden lg:flex items-center gap-6 text-sm font-semibold text-gray-950">
                    <a href="#" class="hover:text-emerald-500 transition-colors">Как покупать</a>
                    <a href="#" class="hover:text-emerald-500 transition-colors">Распродажи</a>
                    <a href="#" class="hover:text-emerald-500 transition-colors">Цены</a>
                    <a href="#" class="hover:text-emerald-500 transition-colors">Помощь</a>
                    <a href="#" class="hover:text-emerald-500 transition-colors">Бонусы</a>
                    <a href="#" class="hover:text-emerald-500 transition-colors">Блог</a>
                    <a href="#" class="hover:text-emerald-500 transition-colors">Магазины</a>

            <div class="flex items-center gap-6">

                    <svg class="w-5 h-5 opacity-80" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">

                <button class="bg-[#00E396] text-white px-6 py-3 rounded-full font-bold text-xs hover:bg-emerald-500 transition-colors cursor-pointer whitespace-nowrap">

                </button>
            </div>
        </header>

        <div class="w-full rounded-[32px] bg-gradient-to-r from-[#4A57A0] via-[#3B7CC4] to-[#3BA3E3] p-8 md:p-12 lg:p-16 flex flex-col justify-center min-h-[300px] relative overflow-hidden">
            
            <div class="space-y-6 z-10">
                <div class="text-xs md:text-sm text-white/60 font-medium flex items-center gap-1.5">
                    <a href="#" class="hover:text-white transition-colors">Главная</a>
                    <span>/</span>
                    <span class="text-white/80">Распродажи</span>
                </div>

                <div class="space-y-3">
                    <h1 class="text-3xl md:text-5xl lg:text-[52px] font-extrabold text-white leading-none tracking-tight">
                        Распродажи
                    </h1>
                    <p class="text-base md:text-lg font-semibold text-white/90">
                        ранний доступ к распродажам в магазинах
                    </p>
                </div>

                <div class="pt-4">
                    <button class="bg-[#00E396] text-white px-8 py-4 rounded-full font-bold text-base hover:bg-emerald-500 transition-colors shadow-lg cursor-pointer">
                        Получить адрес в UK
                    </button>
                </div>
            </div>
